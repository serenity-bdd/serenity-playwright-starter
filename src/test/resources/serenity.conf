# Serenity Configuration
# See: https://serenity-bdd.github.io/docs/reference/serenity-properties

serenity {
  # Project name shown in reports
  project.name = "Serenity Playwright Starter"

  # Take screenshots at the end of each step
  take.screenshots = FOR_EACH_ACTION

  # Report title
  report.title = "Playwright Test Results"
}

# Environment-specific settings
environments {
  default {
    base.url = "https://en.wikipedia.org"
  }
}
